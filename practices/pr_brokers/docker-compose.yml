services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pr-brokers-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    cpus: 1.0
    mem_limit: 1024m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: pr-brokers-redis
    hostname: redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "900mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    cpus: 1.0
    mem_limit: 1024m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

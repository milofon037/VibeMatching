name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'bot/**'
      - 'tests/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/cd-deploy.yml'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests (Pre-Deploy)
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run all backend tests
        run: poetry run pytest tests/unit tests/integration --cov=app

  bot-tests:
    runs-on: ubuntu-latest
    name: Bot Tests (Pre-Deploy)
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run all bot tests
        run: poetry run pytest tests/bot -v
  
  build-and-push:
    needs: [backend-tests, bot-tests]
    runs-on: ubuntu-latest
    name: Build & Push Docker Images
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vibematching-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/vibematching-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/vibematching-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/vibematching-backend:buildcache,mode=max
        if: secrets.DOCKER_USERNAME != ''
      
      - name: Build and push bot image (if Dockerfile.bot exists)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.bot
          push: ${{ secrets.DOCKER_USERNAME != '' && hashFiles('Dockerfile.bot') != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vibematching-bot:latest
            ${{ secrets.DOCKER_USERNAME }}/vibematching-bot:${{ github.sha }}
        if: secrets.DOCKER_USERNAME != '' && hashFiles('Dockerfile.bot') != ''
  
  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    name: Deploy to Server
    if: ${{ secrets.SSH_HOST != '' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vibematching || mkdir -p /opt/vibematching
            if [ -f docker-compose.yml ]; then
              docker-compose pull
              docker-compose up -d --build
            else
              echo "docker-compose.yml not found at deployment location"
              exit 1
            fi
        if: secrets.SSH_HOST != ''
      
      - name: Notify deployment status
        run: echo "✅ Build and deployment workflow completed"

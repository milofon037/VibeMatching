name: Backend CI

on:
  push:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Lint with ruff
        run: poetry run ruff check app tests
      
      - name: Format check with ruff
        run: poetry run ruff format --check app tests
      
      - name: Type check with mypy
        run: poetry run mypy app --ignore-missing-imports

      - name: Security check with bandit
        run: poetry run bandit -r app -ll

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run unit tests
        run: poetry run pytest tests/unit -v --cov=app --cov-report=xml -m unit
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run integration tests
        run: poetry run pytest tests/integration -v --cov=app --cov-report=xml -m integration
        env:
          TEST_DATABASE_URL: sqlite+aiosqlite:///:memory:

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check dependencies
        run: |
          pip install poetry
          poetry install
          poetry run safety check --json

name: Backend CI

on:
  push:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'

env:
  APP_NAME: VibeMatching API
  SERVICE_NAME: vibematching-bot
  HEALTH_STATUS_OK: ok
  APP_ENV: test
  DEBUG: "true"
  API_V1_PREFIX: /api/v1
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  POSTGRES_DB: test_db
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5433
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_DB: 0
  RABBITMQ_HOST: localhost
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  MINIO_ENDPOINT: localhost:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: profile-photos
  MINIO_SECURE: "false"
  PHOTO_MAX_PER_PROFILE: 5
  PHOTO_MAX_FILE_SIZE_BYTES: 5242880
  PHOTO_ALLOWED_CONTENT_TYPES: image/jpeg,image/png,image/webp
  PHOTO_ALLOWED_EXTENSIONS: .jpg,.jpeg,.png,.webp
  FEED_BATCH_SIZE: 20

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Lint with ruff
        run: poetry run ruff check app tests
      
      - name: Format check with ruff
        run: poetry run ruff format --check app tests
      
      - name: Type check with mypy
        run: poetry run mypy app --ignore-missing-imports

      - name: Security check with bandit
        run: poetry run bandit -r app -ll

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run unit tests
        run: poetry run pytest tests/unit -v --cov=app --cov-report=xml -m unit
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: lint-and-type-check
    services:
      minio:
        image: quay.io/minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MinIO did not become ready in time"
          exit 1
      
      - name: Run integration tests
        run: poetry run pytest tests/integration -v --cov=app --cov-report=xml -m integration
        env:
          TEST_DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Check
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check dependencies
        run: |
          pip install poetry
          poetry install
          poetry run pip-audit



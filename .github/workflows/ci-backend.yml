name: Backend CI

on:
  push:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main, dev, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    env:
          APP_NAME: VibeMatching API
          SERVICE_NAME: vibematching-bot
          HEALTH_STATUS_OK: ok
          APP_ENV: test
          DEBUG: "true"
          API_V1_PREFIX: /api/v1
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5433
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: profile-photos
          MINIO_SECURE: "false"
          PHOTO_MAX_PER_PROFILE: 5
          PHOTO_MAX_FILE_SIZE_BYTES: 5242880
          PHOTO_ALLOWED_CONTENT_TYPES: image/jpeg,image/png,image/webp
          PHOTO_ALLOWED_EXTENSIONS: .jpg,.jpeg,.png,.webp
          FEED_BATCH_SIZE: 20
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Lint with ruff
        run: poetry run ruff check app tests
      
      - name: Format check with ruff
        run: poetry run ruff format --check app tests
      
      - name: Type check with mypy
        run: poetry run mypy app --ignore-missing-imports

      - name: Security check with bandit
        run: poetry run bandit -r app -ll

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run unit tests
        run: poetry run pytest tests/unit -v --cov=app --cov-report=xml -m unit
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
      
      - name: Run integration tests
        run: poetry run pytest tests/integration -v --cov=app --cov-report=xml -m integration
        env:
          TEST_DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Check
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: .
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check dependencies
        run: |
          pip install poetry
          poetry install
          poetry run safety check --json


